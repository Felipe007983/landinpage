services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=zeususer
      - POSTGRES_PASSWORD=zeuspass
      - POSTGRES_DB=zeusdb
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - zeus-network

  backend:
    build:
      context: ./backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://zeususer:zeuspass@db:5432/zeusdb?schema=public
      - PORT=3000
    depends_on:
      - db
    command: /bin/sh -c "sleep 5 && npx prisma db push --accept-data-loss && npx prisma db seed && npm start"
    networks:
      - zeus-network

  frontend:
    build:
      context: ./landinpage
    restart: always
    networks:
      - zeus-network

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    networks:
      - zeus-network

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - zeus-network

networks:
  zeus-network:
    driver: bridge
